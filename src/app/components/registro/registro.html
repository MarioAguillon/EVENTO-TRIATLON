<section class="registro-section" id="inscripcion">
  <div class="registro-container">
    <div class="registro-info">
      <h2>¡ASEGURA TU <span>CUPO</span>!</h2>
      <p>Las inscripciones cierran el 15 de mayo. No te quedes fuera de la competencia más importante del año.</p>
      <ul class="beneficios">
        <li>✅ Kit de competencia oficial</li>
        <li>✅ Medalla de finalista</li>
        <li>✅ Chip de cronometraje</li>
      </ul>
    </div>

    <form class="registro-form">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" placeholder="Ej. Juan Pérez">
      </div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" placeholder="juan@ejemplo.com">
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select>
          <option>Sprint (750m / 20km / 5km)</option>
          <option>Olímpico (1.5km / 40km / 10km)</option>
          <option>Ironman 70.3</option>
        </select>
      </div>
      <button type="submit" class="btn-enviar">ENVIAR INSCRIPCIÓN</button>
    </form>
  </div>
</section>
